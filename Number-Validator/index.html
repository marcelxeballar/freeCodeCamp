<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="styles.css">
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200" />
  <title>Number Validator</title>
</head>
<body class="flex-col ">
  <div class="input-container container">
    <span class="material-symbols-outlined verify-icon">
      verified
    </span>
    <h2>Provide your phone number</h2>
    <p>Provide your number using the format provided. To validate, simply click the button.</p>
    <div class="input-wrapper flex-row">
      <div class="country-wrapper flex-col">
        <div class="ct-selected flex-row">
        </div>
        <div class="ct-list hidden"></div>
      </div>
      <label class="flex-row">
        <input id ="user-input" type="text" placeholder="09090909">
        <span class="material-symbols-outlined  delete-input">
          delete
          </span>
      </label>
    </div>
  </div>
  <div class="tip-container container flex-row">
  </div>
  <div class="button-container flex-col container">
    <button id="check-btn">Validate</button>
    <button id="clear-btn" class="hidden">Validate Again</button>
  </div>
</body>
<script src="scripts.js"></script>
</html>
